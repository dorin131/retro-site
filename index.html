<!doctype html>
<html lang="en">
    <script>
        function show(event) {
            var targetSectionName = event.target.innerHTML.toLowerCase();
            var contentSections = document.getElementsByClassName("content");
            for (var i = 0; i < contentSections.length; i++) {
                if (targetSectionName == contentSections[i].id) {
                    console.log("revealing", contentSections[i].id);
                    contentSections[i].style.display = "block";
                } else {
                    console.log("hiding", contentSections[i]);
                    contentSections[i].style.display = "none";
                }
            }
        }
    </script>
    <head>
        <title>Dorin's website</title>
        <style>
            body {
                background-color: black;
                color: chartreuse;
                font: 12px monospace;
            }
            table {
                border: 1px solid white;
                height: 60ch;
                margin: 0px auto;
            }
            td {
                border: 1px solid gray;
                vertical-align: top;
                text-align: center;
            }
            p {
                align-content: center;
            }
            a, a:visited {
                color: chartreuse;
            }
            #menu-header {
                width: 20ch;
                height: 1ch;
            }
            #content-box {
                width: 60ch;
            }
            #home {
                display: block;
            }
            #links {
                display: none;
            }
            #contact {
                display: none;
            }
            #skull {
                height: 50px;
                margin-left: 10px;
            }
            #footer {
                height: 1ch;
            }
        </style>
    </head>
    <body>
        <table>
            <tr>
                <td id="menu-header">
                    <p><b>Menu</b></p>
                </td>
                <td id="content-box" rowspan="2">
                    <p class="content" id="home">
                        <b>Welcome to my web page</b>
                        <br/>
                        <img id="skull" src="./skull.gif"/>
                    </p>
                    <p class="content" id="links"><a href="https://github.com/dorin131">GitHub</a></p>
                    <p class="content" id="contact"><a href="https://www.linkedin.com/in/dorin131/">LinkedIn</a></p>
                </td>
            </tr>
            <tr>
                <td>
                    <p><a href="#" class="menu" onclick="show(event)">Home</a></p>
                    <p><a href="#" class="menu" onclick="show(event)">Links</a></p>
                    <p><a href="#" class="menu" onclick="show(event)">Contact</a></p>
                </td>
            </tr>
            <tr>
                <td id="footer" colspan="2">
                    <marquee><i>Crafted with love and without AI</i></marquee>
                </td>
            </tr>
        </table>
    </body>
</html>
